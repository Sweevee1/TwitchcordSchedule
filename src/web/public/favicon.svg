<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <clipPath id="cal">
      <rect x="3" y="12" width="58" height="48" rx="8"/>
    </clipPath>
  </defs>
  <!-- Calendar body -->
  <rect x="3" y="12" width="58" height="48" rx="8" fill="white"/>
  <!-- Header strip (clipped so it respects rounded corners) -->
  <rect x="3" y="12" width="58" height="13" fill="#5865F2" clip-path="url(#cal)"/>
  <!-- Calendar border -->
  <rect x="3" y="12" width="58" height="48" rx="8" stroke="#5865F2" stroke-width="3" fill="none"/>
  <!-- Ring tabs -->
  <rect x="17" y="6" width="8" height="13" rx="3" fill="white" stroke="#5865F2" stroke-width="2.5"/>
  <rect x="39" y="6" width="8" height="13" rx="3" fill="white" stroke="#5865F2" stroke-width="2.5"/>
  <!-- Discord Clyde -->
  <g fill="#5865F2">
    <circle cx="23" cy="31" r="8"/>
    <circle cx="41" cy="31" r="8"/>
    <ellipse cx="32" cy="42" rx="14" ry="11"/>
    <polygon points="20,50 13,59 29,52"/>
  </g>
  <!-- Eyes -->
  <circle cx="26" cy="42" r="4" fill="white"/>
  <circle cx="38" cy="42" r="4" fill="white"/>
</svg>
